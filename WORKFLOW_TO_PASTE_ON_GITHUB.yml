# Инструкция: на GitHub → Add file → Create new file
# Путь файла: .github/workflows/fly-deploy.yml
# Вставьте содержимое НИЖЕ этих строк (без комментариев), либо удалите эти 3 строки.

name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
